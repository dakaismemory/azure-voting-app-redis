name: aks-ci-cd

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build image
        uses: azure/cli@v2
        with:
          inlineScript: |
            az acr build \
              --registry ${{ secrets.registry }} \
              --image azure-vote:latest \
              .
