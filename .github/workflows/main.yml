name: build_deploy_aks

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build Docker image
        run: |
          docker build -t myacr873624.azurecr.io/azure-vote-front:${{ github.sha }} ./azure-vote

      - name: Login to ACR
        run: |
          echo ${{ secrets.AZURE_CREDENTIALS }} | az login --service-principal --username ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }} --password ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }} --tenant ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}

          az acr login --name myacr873624

      - name: Push image
        run: |
          docker push myacr873624.azurecr.io/azure-vote-front:${{ github.sha }}

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.resource_group }}
          cluster-name: ${{ secrets.cluster_name }}

      - name: Deploy to AKS
        uses: Azure/k8s-deploy@v4
        with:
          namespace: default
          manifests: |
            azure-vote-all-in-one-redis.yaml
          images: |
            myacr873624.azurecr.io/azure-vote-front:${{ github.sha }}
